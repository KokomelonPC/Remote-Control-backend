services:
  - type: web
    name: remote-control-backend
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: MQTT_HOST
        value: 3342e4fb3c864571b97185e91ef66377.s1.eu.hivemq.cloud
      - key: MQTT_PORT
        value: "8883"
      - key: MQTT_USERNAME
        sync: false
      - key: MQTT_PASSWORD
        sync: false
      - key: SHEET_CSV_URL
        sync: false
      - key: REMOTE_SHEET_API_URL
        value: https://script.google.com/macros/s/AKfycbzzFLMKiPR-b4AY50GurldAaP16qzThDEqWUyLlytVhHPHyQhfYmurTQgW1I_2UPJH1kA/exec
